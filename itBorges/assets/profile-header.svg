<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Isaac Till Borges — Desenvolvimento Backend</title>
  <desc id="desc">Banner animado em estilo terminal com Java, Spring Boot e PostgreSQL.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.52" stop-color="#101923"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f89820"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>

    <radialGradient id="blue-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8b949e" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="card-clip">
      <rect x="1" y="1" width="1198" height="358" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <rect width="1200" height="360" fill="url(#background)"/>
    <rect width="1200" height="360" fill="url(#grid)"/>
    <circle cx="1050" cy="70" r="260" fill="url(#blue-glow)"/>
    <circle cx="1050" cy="70" r="115" fill="none" stroke="#58a6ff" stroke-opacity="0.11"/>
    <circle cx="1050" cy="70" r="155" fill="none" stroke="#3fb950" stroke-opacity="0.08"/>

    <g opacity="0.16" fill="none" stroke-linecap="round">
      <path d="M850 68h86l24 24h126" stroke="#58a6ff" stroke-width="2"/>
      <path d="M892 118h116l20 20h108" stroke="#3fb950" stroke-width="2"/>
      <path d="M828 170h76l22 22h178" stroke="#f89820" stroke-width="2"/>
      <path d="M930 220h54l20 20h120" stroke="#58a6ff" stroke-width="2"/>
      <circle cx="850" cy="68" r="4" fill="#58a6ff" stroke="none"/>
      <circle cx="892" cy="118" r="4" fill="#3fb950" stroke="none"/>
      <circle cx="828" cy="170" r="4" fill="#f89820" stroke="none"/>
      <circle cx="930" cy="220" r="4" fill="#58a6ff" stroke="none"/>
    </g>

    <path d="M-80 325 C240 260 420 385 710 310 S1060 255 1290 300" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="16 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-68" dur="5s" repeatCount="indefinite"/>
    </path>

    <g transform="translate(64 44)">
      <rect width="1072" height="272" rx="18" fill="#0d1117" fill-opacity="0.58" stroke="#30363d"/>
      <path d="M0 48h1072" stroke="#30363d"/>
      <circle cx="24" cy="24" r="6" fill="#ff5f56"/>
      <circle cx="46" cy="24" r="6" fill="#ffbd2e"/>
      <circle cx="68" cy="24" r="6" fill="#27c93f"/>
      <text x="536" y="29" text-anchor="middle" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="13">isaac@github: ~/backend</text>

      <g transform="translate(44 82)">
        <text x="0" y="0" fill="#3fb950" font-family="Consolas, 'Courier New', monospace" font-size="16" font-weight="700" letter-spacing="2">OLÁ, EU SOU</text>
        <text x="0" y="66" fill="#f0f6fc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="1">ISAAC TILL BORGES</text>
        <rect x="0" y="84" width="620" height="3" rx="1.5" fill="url(#accent)"/>
        <text x="0" y="124" fill="#c9d1d9" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" letter-spacing="2">BACKEND · JAVA · SPRING BOOT · POSTGRESQL</text>

        <g transform="translate(0 157)">
          <text x="0" y="18" fill="#58a6ff" font-family="Consolas, 'Courier New', monospace" font-size="17">&gt;</text>
          <text x="24" y="18" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="17">construindo software para problemas reais</text>
          <rect x="454" y="2" width="9" height="21" rx="1" fill="#3fb950" filter="url(#soft-glow)">
            <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.15s" repeatCount="indefinite"/>
          </rect>
        </g>
      </g>

      <g transform="translate(881 82)">
        <rect width="147" height="34" rx="17" fill="#238636" fill-opacity="0.18" stroke="#3fb950" stroke-opacity="0.55"/>
        <circle cx="18" cy="17" r="5" fill="#3fb950" filter="url(#soft-glow)">
          <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="32" y="22" fill="#7ee787" font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="700">EM EVOLUÇÃO</text>
      </g>

      <text x="1028" y="242" text-anchor="end" fill="#8b949e" font-family="Consolas, 'Courier New', monospace" font-size="14">Blumenau · SC · Brasil</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="24" fill="none" stroke="#30363d" stroke-width="2"/>
</svg>
